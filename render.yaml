services:
  - type: web
    name: sanjivani-codearena-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # set this manually to your Postgres connection string (e.g. from Neon)
      - key: PORT
        value: 4000
