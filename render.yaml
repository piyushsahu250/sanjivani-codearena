services:
  - type: web
    name: sanjivani-codearena-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sanjivani-codearena-db
          property: connectionString
      - key: PORT
        value: 4000

databases:
  - name: sanjivani-codearena-db
    plan: free
