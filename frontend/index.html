<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/branding/logo.png" />
    <link rel="apple-touch-icon" href="/branding/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1b4332" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CodeArena - Coding Platform: coding tests, learning modules, and skill assessments." />
    <!--
      Static, site-wide Open Graph tags — this is a client-rendered SPA with no server-side
      rendering, so link-preview crawlers (LinkedIn, Facebook, etc., which don't execute JS) only
      ever see this fixed HTML. A per-certificate preview (student name/course in the card) would
      need SSR or a prerendering function, which is out of scope here — every shared link gets
      this same generic CodeArena preview rather than a personalized one.
    -->
    <meta property="og:title" content="CodeArena - Coding Platform" />
    <meta property="og:description" content="Coding tests, learning modules, mock interviews, and skill assessments." />
    <meta property="og:image" content="/branding/logo.png" />
    <meta property="og:type" content="website" />
    <title>CodeArena - Coding Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
